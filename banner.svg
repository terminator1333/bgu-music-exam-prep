<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" role="img" aria-label="BGU Music Exam Prep banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f6f3"/>
      <stop offset="100%" stop-color="#e4ecf7"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b6cb5"/>
      <stop offset="100%" stop-color="#6fa872"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- Staff lines flowing across -->
  <g stroke="#3b6cb5" stroke-opacity="0.18" stroke-width="1.4" fill="none">
    <path d="M 0 110 Q 300 90, 600 110 T 1200 110"/>
    <path d="M 0 140 Q 300 120, 600 140 T 1200 140"/>
    <path d="M 0 170 Q 300 150, 600 170 T 1200 170"/>
    <path d="M 0 200 Q 300 180, 600 200 T 1200 200"/>
    <path d="M 0 230 Q 300 210, 600 230 T 1200 230"/>
  </g>

  <!-- Treble clef (stylized) -->
  <g transform="translate(80 60)" fill="#3b6cb5">
    <path d="M 50 0
             C 30 10, 20 40, 30 70
             C 40 100, 70 115, 70 150
             C 70 180, 50 200, 30 200
             C 10 200, 0 185, 5 170
             C 10 155, 30 150, 40 165
             C 45 173, 42 185, 32 188
             L 32 188
             C 45 192, 62 182, 60 165
             C 58 140, 40 120, 40 95
             C 40 55, 55 25, 68 20
             C 80 16, 90 30, 88 48
             C 86 65, 70 80, 55 85"
          stroke="#3b6cb5" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="40" cy="168" r="8" fill="#3b6cb5"/>
  </g>

  <!-- Musical notes scattered -->
  <g fill="#6fa872" opacity="0.55">
    <circle cx="230" cy="200" r="7"/>
    <line x1="237" y1="200" x2="237" y2="160" stroke="#6fa872" stroke-width="2.5"/>
    <circle cx="340" cy="170" r="7"/>
    <line x1="347" y1="170" x2="347" y2="130" stroke="#6fa872" stroke-width="2.5"/>
    <circle cx="430" cy="210" r="7"/>
    <line x1="437" y1="210" x2="437" y2="170" stroke="#6fa872" stroke-width="2.5"/>
  </g>

  <!-- Title block -->
  <g font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
    <text x="1140" y="100" font-size="44" font-weight="700" fill="#24292f" text-anchor="end">
      BGU Music Exam Prep
    </text>
    <text x="1140" y="150" font-size="24" font-weight="500" fill="#3b6cb5" text-anchor="end" direction="rtl">
      חוויה מוזיקלית — שומעים שזה קלאסי
    </text>
    <text x="1140" y="200" font-size="16" fill="#57606a" text-anchor="end">
      Ben Gurion University classical music course · practice &amp; review
    </text>
    <g transform="translate(1140 230)">
      <rect x="-210" y="0" width="70" height="28" rx="14" fill="#3b6cb5"/>
      <text x="-175" y="19" font-size="13" fill="#ffffff" font-weight="600" text-anchor="middle">75 שאלות</text>
      <rect x="-130" y="0" width="70" height="28" rx="14" fill="#6fa872"/>
      <text x="-95" y="19" font-size="13" fill="#ffffff" font-weight="600" text-anchor="middle">6 שיעורים</text>
      <rect x="-50" y="0" width="50" height="28" rx="14" fill="#c77268"/>
      <text x="-25" y="19" font-size="13" fill="#ffffff" font-weight="600" text-anchor="middle">עברית</text>
    </g>
  </g>
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" width="900" height="560" role="img" aria-label="Exam mode screenshot">
  <rect width="900" height="560" fill="#f7f6f3"/>

  <!-- Top bar -->
  <g font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
    <text x="860" y="44" font-size="20" font-weight="700" fill="#24292f" text-anchor="end" direction="rtl">חוויה מוזיקלית — מבחן</text>
    <text x="860" y="68" font-size="13" fill="#57606a" text-anchor="end" direction="rtl">ציון נחשף רק בסיום · 20 שאלות אקראיות</text>
    <text x="40" y="44" font-size="13" fill="#3b6cb5" font-weight="600">◀ חזרה לתפריט</text>
  </g>

  <!-- Progress bar -->
  <rect x="40" y="82" width="820" height="6" rx="3" fill="#e6e8eb"/>
  <rect x="40" y="82" width="280" height="6" rx="3" fill="#3b6cb5"/>

  <!-- Card -->
  <g>
    <rect x="40" y="108" width="820" height="412" rx="14" fill="#ffffff" stroke="#d6d3cf"/>

    <!-- Progress + source -->
    <g font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
      <text x="840" y="140" font-size="14" fill="#24292f" font-weight="600" text-anchor="end" direction="rtl">שאלה 7 מתוך 20</text>
      <rect x="60" y="122" width="84" height="24" rx="12" fill="#fae7c2"/>
      <text x="102" y="139" font-size="12" fill="#6b4d11" text-anchor="middle" direction="rtl">שיעור 4 · מצגת</text>
    </g>

    <!-- Question -->
    <text x="840" y="196" font-size="22" font-weight="600" fill="#24292f" text-anchor="end" direction="rtl" font-family="system-ui, sans-serif">
      לאיזו קבוצה של כלי נשיפה מעץ שייך האבוב?
    </text>

    <!-- Options -->
    <g font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
      <rect x="60" y="226" width="780" height="50" rx="10" fill="#ffffff" stroke="#d6d3cf"/>
      <circle cx="800" cy="251" r="14" fill="#e6e8eb"/>
      <text x="800" y="256" font-size="14" fill="#24292f" text-anchor="middle" font-weight="700">א</text>
      <text x="778" y="256" font-size="16" fill="#57606a" text-anchor="end" direction="rtl">ללא סופית (Air Jet)</text>

      <rect x="60" y="284" width="780" height="50" rx="10" fill="#ffffff" stroke="#d6d3cf"/>
      <circle cx="800" cy="309" r="14" fill="#e6e8eb"/>
      <text x="800" y="314" font-size="14" fill="#24292f" text-anchor="middle" font-weight="700">ב</text>
      <text x="778" y="314" font-size="16" fill="#57606a" text-anchor="end" direction="rtl">סופית בודדת</text>

      <!-- Selected but not revealed -->
      <rect x="60" y="342" width="780" height="50" rx="10" fill="#e4ecf7" stroke="#3b6cb5" stroke-width="2"/>
      <circle cx="800" cy="367" r="14" fill="#3b6cb5"/>
      <text x="800" y="372" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="700">ג</text>
      <text x="778" y="372" font-size="16" fill="#24292f" text-anchor="end" direction="rtl">סופית כפולה</text>

      <rect x="60" y="400" width="780" height="50" rx="10" fill="#ffffff" stroke="#d6d3cf"/>
      <circle cx="800" cy="425" r="14" fill="#e6e8eb"/>
      <text x="800" y="430" font-size="14" fill="#24292f" text-anchor="middle" font-weight="700">ד</text>
      <text x="778" y="430" font-size="16" fill="#57606a" text-anchor="end" direction="rtl">כלי פליז</text>
    </g>

    <!-- Buttons -->
    <g font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
      <rect x="694" y="470" width="146" height="36" rx="8" fill="#3b6cb5"/>
      <text x="767" y="494" font-size="14" fill="#ffffff" font-weight="600" text-anchor="middle" direction="rtl">הבאה ◀</text>
      <rect x="540" y="470" width="140" height="36" rx="8" fill="#ffffff" stroke="#d6d3cf"/>
      <text x="610" y="494" font-size="14" fill="#57606a" text-anchor="middle" direction="rtl">▶ הקודמת</text>
      <text x="60" y="494" font-size="13" fill="#57606a" direction="rtl">הגשת מבחן בסוף</text>
    </g>
  </g>
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" width="900" height="560" role="img" aria-label="Weak-spot drill screenshot">
  <rect width="900" height="560" fill="#f7f6f3"/>

  <!-- Top bar -->
  <g font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
    <text x="860" y="44" font-size="20" font-weight="700" fill="#24292f" text-anchor="end" direction="rtl">נקודות חולשה</text>
    <text x="860" y="68" font-size="13" fill="#57606a" text-anchor="end" direction="rtl">שאלות שבהן טעית מופיעות בתדירות גבוהה יותר</text>
    <text x="40" y="44" font-size="13" fill="#3b6cb5" font-weight="600">◀ חזרה לתפריט</text>
  </g>

  <!-- Stats strip -->
  <g font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
    <rect x="40" y="84" width="820" height="54" rx="10" fill="#ffffff" stroke="#d6d3cf"/>
    <g>
      <text x="830" y="108" font-size="12" fill="#57606a" text-anchor="end" direction="rtl">נענו</text>
      <text x="830" y="128" font-size="20" font-weight="700" fill="#24292f" text-anchor="end">47</text>
    </g>
    <g>
      <text x="690" y="108" font-size="12" fill="#57606a" text-anchor="end" direction="rtl">דיוק</text>
      <text x="690" y="128" font-size="20" font-weight="700" fill="#1e3d20" text-anchor="end">78%</text>
    </g>
    <g>
      <text x="540" y="108" font-size="12" fill="#57606a" text-anchor="end" direction="rtl">חלשים</text>
      <text x="540" y="128" font-size="20" font-weight="700" fill="#54201a" text-anchor="end">12</text>
    </g>
    <g>
      <text x="360" y="108" font-size="12" fill="#57606a" text-anchor="end" direction="rtl">ציון אחרון</text>
      <text x="360" y="128" font-size="20" font-weight="700" fill="#3b6cb5" text-anchor="end">15/20</text>
    </g>
  </g>

  <!-- Card -->
  <g>
    <rect x="40" y="158" width="820" height="370" rx="14" fill="#ffffff" stroke="#d6d3cf"/>

    <g font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
      <rect x="726" y="180" width="114" height="24" rx="12" fill="#fae7c2"/>
      <text x="783" y="197" font-size="12" fill="#6b4d11" text-anchor="middle" direction="rtl">שיעור 6 · שאלון</text>
    </g>

    <text x="840" y="246" font-size="21" font-weight="600" fill="#24292f" text-anchor="end" direction="rtl" font-family="system-ui, sans-serif">
      מה ההבדל העיקרי בין אריה לרצ׳יטטיב?
    </text>

    <!-- Options -->
    <g font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
      <rect x="60" y="276" width="780" height="46" rx="10" fill="#ffffff" stroke="#d6d3cf"/>
      <circle cx="800" cy="299" r="14" fill="#e6e8eb"/>
      <text x="800" y="304" font-size="14" fill="#24292f" text-anchor="middle" font-weight="700">א</text>
      <text x="778" y="304" font-size="15" fill="#57606a" text-anchor="end" direction="rtl">אריה מהירה יותר</text>

      <rect x="60" y="330" width="780" height="46" rx="10" fill="#ffffff" stroke="#d6d3cf"/>
      <circle cx="800" cy="353" r="14" fill="#e6e8eb"/>
      <text x="800" y="358" font-size="14" fill="#24292f" text-anchor="middle" font-weight="700">ב</text>
      <text x="778" y="358" font-size="15" fill="#57606a" text-anchor="end" direction="rtl">רצ׳יטטיב תמיד מושר במקהלה</text>

      <rect x="60" y="384" width="780" height="46" rx="10" fill="#ffffff" stroke="#d6d3cf"/>
      <circle cx="800" cy="407" r="14" fill="#e6e8eb"/>
      <text x="800" y="412" font-size="14" fill="#24292f" text-anchor="middle" font-weight="700">ג</text>
      <text x="778" y="412" font-size="15" fill="#57606a" text-anchor="end" direction="rtl">אריה מבטאת רגש ומלודיה, רצ׳יטטיב דיבורי ומקדם את העלילה</text>

      <rect x="60" y="438" width="780" height="46" rx="10" fill="#ffffff" stroke="#d6d3cf"/>
      <circle cx="800" cy="461" r="14" fill="#e6e8eb"/>
      <text x="800" y="466" font-size="14" fill="#24292f" text-anchor="middle" font-weight="700">ד</text>
      <text x="778" y="466" font-size="15" fill="#57606a" text-anchor="end" direction="rtl">אין הבדל ביניהם</text>
    </g>

    <text x="840" y="510" font-size="12" fill="#57606a" text-anchor="end" direction="rtl" font-family="system-ui, sans-serif">
      מתוך 12 השאלות שבהן טעית בעבר
    </text>
  </g>
</svg>
